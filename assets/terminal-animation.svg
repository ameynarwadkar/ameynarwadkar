<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

    .bg         { fill: #0d1117; }
    .titlebar   { fill: #161b22; }
    .dot-r      { fill: #ff5f56; }
    .dot-y      { fill: #ffbd2e; }
    .dot-g      { fill: #27c93f; }
    .title      { fill: #8b949e; font-family: 'JetBrains Mono', monospace; font-size: 12px; }

    .prompt     { fill: #27c93f; font-family: 'JetBrains Mono', monospace; font-size: 13.5px; font-weight: 700; }
    .cmd        { fill: #e6edf3; font-family: 'JetBrains Mono', monospace; font-size: 13.5px; }
    .flag       { fill: #ff7b72; font-family: 'JetBrains Mono', monospace; font-size: 13.5px; }
    .str        { fill: #a5d6ff; font-family: 'JetBrains Mono', monospace; font-size: 13.5px; }
    .comment    { fill: #6e7681; font-family: 'JetBrains Mono', monospace; font-size: 13.5px; font-style: italic; }
    .out        { fill: #7ee787; font-family: 'JetBrains Mono', monospace; font-size: 13.5px; }
    .dim        { fill: #58a6ff; font-family: 'JetBrains Mono', monospace; font-size: 13.5px; }
    .warn       { fill: #d29922; font-family: 'JetBrains Mono', monospace; font-size: 13.5px; }
    .kw         { fill: #d2a8ff; font-family: 'JetBrains Mono', monospace; font-size: 13.5px; }
    .ok         { fill: #3fb950; font-family: 'JetBrains Mono', monospace; font-size: 13.5px; font-weight: 700; }
    .cyan       { fill: #00d9ff; font-family: 'JetBrains Mono', monospace; font-size: 13.5px; font-weight: 700; }

    .cursor { animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .line { opacity: 0; }
    .l1  { animation: show .05s 0.3s  forwards; }
    .l2  { animation: show .05s 1.2s  forwards; }
    .l3  { animation: show .05s 2.0s  forwards; }
    .l4  { animation: show .05s 2.8s  forwards; }
    .l5  { animation: show .05s 3.6s  forwards; }
    .l6  { animation: show .05s 4.4s  forwards; }
    .l7  { animation: show .05s 5.2s  forwards; }
    .l8  { animation: show .05s 6.0s  forwards; }
    .l9  { animation: show .05s 7.0s  forwards; }
    .l10 { animation: show .05s 8.0s  forwards; }
    @keyframes show { to { opacity:1 } }

    .bar      { fill: #161b22; }
    .bar-text { fill: #8b949e; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    .bar-hi   { fill: #00d9ff; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; }
  </style>

  <!-- window -->
  <rect class="bg" width="850" height="400" rx="12"/>
  <rect class="titlebar" width="850" height="38" rx="12"/>
  <rect class="titlebar" y="26" width="850" height="12"/>
  <circle class="dot-r" cx="22" cy="19" r="6"/>
  <circle class="dot-y" cx="42" cy="19" r="6"/>
  <circle class="dot-g" cx="62" cy="19" r="6"/>
  <text class="title" x="425" y="23" text-anchor="middle">amey@heidelberg ~ building multi-agent systems</text>

  <!-- content -->
  <g transform="translate(24, 62)">

    <!-- 1: comment -->
    <g class="line l1">
      <text class="comment" y="0">## spinning up agents for a research task</text>
    </g>

    <!-- 2: launch agents -->
    <g class="line l2">
      <text y="32">
        <tspan class="prompt">$ </tspan>
        <tspan class="kw">agents</tspan>
        <tspan class="cmd"> launch</tspan>
        <tspan class="flag"> --harness</tspan>
        <tspan class="str"> searcher analyzer reasoner</tspan>
      </text>
    </g>

    <!-- 3: agents ready -->
    <g class="line l3">
      <text class="out" y="60">  [ok] 3 agents online, orchestrator ready</text>
    </g>

    <!-- 4: run query -->
    <g class="line l4">
      <text y="94">
        <tspan class="prompt">$ </tspan>
        <tspan class="cmd">ask</tspan>
        <tspan class="str"> "how do transformers handle long context efficiently?"</tspan>
      </text>
    </g>

    <!-- 5: searching -->
    <g class="line l5">
      <text y="124">
        <tspan class="dim">  searching ArXiv, PubMed, OpenAlex...</tspan>
        <tspan class="out"> 23 papers found</tspan>
      </text>
    </g>

    <!-- 6: analyzing -->
    <g class="line l6">
      <text y="154">
        <tspan class="dim">  analyzing PDFs with vision model...</tspan>
        <tspan class="out"> 9 papers parsed</tspan>
      </text>
    </g>

    <!-- 7: gap + requery -->
    <g class="line l7">
      <text y="184">
        <tspan class="warn">  [gap found]</tspan>
        <tspan class="dim"> re-searching to fill missing info...</tspan>
        <tspan class="out"> done</tspan>
      </text>
    </g>

    <!-- 8: done -->
    <g class="line l8">
      <text class="ok" y="214">  [ok] review ready, 14 claims verified, 6 citations</text>
    </g>

    <!-- 9: eval -->
    <g class="line l9">
      <text y="248">
        <tspan class="prompt">$ </tspan>
        <tspan class="cmd">eval</tspan>
        <tspan class="flag"> --check</tspan>
        <tspan class="str"> accuracy relevance</tspan>
      </text>
    </g>

    <!-- 10: cursor -->
    <g class="line l10">
      <text y="278">
        <tspan class="out">  accuracy 0.97  relevance 0.94  </tspan>
        <tspan class="ok">all checks passed</tspan>
      </text>
    </g>

  </g>

  <!-- status bar -->
  <rect class="bar" y="378" width="850" height="22"/>
  <rect class="bg" y="378" width="850" height="1"/>
  <text class="bar-hi"   x="16"  y="394">● main</text>
  <text class="bar-text"  x="76"  y="394">| LangGraph</text>
  <text class="bar-text"  x="180" y="394">| FastAPI</text>
  <text class="bar-text"  x="270" y="394">| Python 3.11</text>
  <text class="bar-text"  x="400" y="394">| Qdrant</text>
  <text class="bar-hi"    x="760" y="394">Heidelberg</text>
</svg>
